<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GHOST_LOVECRAFT_OS // COMPLETE SIGNAL ARCHIVE</title>
<meta name="description" content="The complete Lovecraft OS archive: cosmic horror mapped as operating-system architecture.">
<style>
  @import url('https://fonts.googleapis.com/css2?family=VT323&family=Press+Start+2P&display=swap');
  
  :root {
    --void: #05040a;
    --neon-pink: #ff00aa;
    --neon-cyan: #00ffcc;
    --neon-lime: #ccff00;
    --neon-purple: #aa00ff;
    --grunge-red: #3a0f0f;
    --aged: #1a140f;
  }
  
  * { box-sizing: border-box; }
  
  body {
    margin: 0;
    background: #05040a;
    color: #e8e0d0;
    font-family: 'VT323', 'Courier New', monospace;
    overflow-x: hidden;
    image-rendering: crisp-edges;
  }
  
  #underlayer {
    position: fixed;
    inset: 0;
    z-index: -2;
    background: #05040a;
  }
  
  .crt {
    position: fixed;
    inset: 0;
    z-index: -1;
    pointer-events: none;
    background: repeating-linear-gradient(
      0deg,
      rgba(255,255,255,0.03) 0px,
      rgba(255,255,255,0.03) 1px,
      transparent 1px,
      transparent 4px
    );
    mix-blend-mode: overlay;
  }
  
  main {
    max-width: 1080px;
    margin: 0 auto;
    padding: 2rem 1rem 4rem;
    position: relative;
    z-index: 1;
  }
  
  .top-bar {
    position: sticky;
    top: 1rem;
    z-index: 100;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(5,4,10,0.85);
    border: 2px solid #ff00aa;
    border-radius: 4px;
    padding: 0.6rem 1.2rem;
    margin-bottom: 2rem;
    box-shadow: 0 0 30px rgba(255,0,170,0.3);
    backdrop-filter: blur(8px);
  }
  
  .top-bar .title {
    font-family: 'Press Start 2P', monospace;
    font-size: 1.35rem;
    letter-spacing: 4px;
    color: #00ffcc;
    text-shadow: 
      0 0 10px #00ffcc,
      3px 0 #ff00aa,
      -2px 0 #ccff00;
  }
  
  button {
    font-family: 'VT323', monospace;
    font-size: 1.1rem;
    background: #1a140f;
    color: #ccff00;
    border: 2px solid #ccff00;
    padding: 0.4rem 1.2rem;
    cursor: pointer;
    transition: all 0.1s;
    text-transform: uppercase;
    letter-spacing: 2px;
  }
  
  button:hover {
    background: #ccff00;
    color: #05040a;
    box-shadow: 0 0 20px #ccff00;
  }
  
  .hero {
    text-align: center;
    margin-bottom: 3rem;
    padding: 2rem 1rem;
    border: 3px solid #ff00aa;
    border-image: linear-gradient(#ff00aa, #00ffcc) 1;
    background: rgba(5,4,10,0.6);
  }
  
  .hero .eyebrow {
    color: #ccff00;
    font-size: 1.1rem;
    letter-spacing: 6px;
    margin-bottom: 0.5rem;
    text-transform: uppercase;
  }
  
  .hero h1 {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(2.2rem, 7vw, 4.8rem);
    line-height: 1.05;
    margin: 0.3rem 0 1rem;
    color: #fff;
    text-shadow: 
      0 0 20px #ff00aa,
      4px 0 #00ffcc,
      -3px 0 #ccff00,
      0 0 40px #aa00ff;
    animation: intense-glitch 2.5s infinite linear;
  }
  
  .hero .lede {
    max-width: 720px;
    margin: 0 auto;
    font-size: 1.45rem;
    line-height: 1.4;
    color: #c9d8ff;
  }
  
  .sigil {
    font-family: monospace;
    font-size: 1.8rem;
    color: #00ffcc;
    text-shadow: 0 0 25px #00ffcc;
    margin: 1.5rem 0;
    white-space: pre;
    line-height: 1.1;
    animation: float-sigil 6s ease-in-out infinite;
  }
  
  .inspector {
    background: #120f0a;
    border: 4px solid #3a2a1f;
    border-radius: 6px;
    padding: 2rem;
    margin-bottom: 2.5rem;
    box-shadow: 
      0 0 0 8px #05040a,
      inset 0 0 80px rgba(0,0,0,0.6),
      0 25px 70px rgba(0,0,0,0.8);
    position: relative;
    overflow: hidden;
  }
  
  .inspector::before {
    content: '';
    position: absolute;
    inset: 0;
    background: 
      linear-gradient(rgba(255,255,255,0.015) 50%, transparent 50%),
      linear-gradient(90deg, rgba(255,255,255,0.015) 50%, transparent 50%);
    background-size: 6px 6px;
    pointer-events: none;
    z-index: 1;
    mix-blend-mode: overlay;
  }
  
  .inspector-header {
    display: flex;
    align-items: center;
    gap: 1.5rem;
    margin-bottom: 1.5rem;
    padding-bottom: 1rem;
    border-bottom: 2px dashed #3a2a1f;
  }
  
  .inspector .glyph {
    font-size: 5.5rem;
    line-height: 1;
    color: #ffeb68;
    text-shadow: 0 0 30px #ff2bd6;
    flex-shrink: 0;
  }
  
  .inspector h2 {
    font-size: 2.4rem;
    margin: 0;
    color: #ffeb68;
    text-shadow: 0 0 15px #ff2bd6;
  }
  
  .inspector .tag {
    font-size: 1.1rem;
    color: #7dffcb;
    letter-spacing: 3px;
    margin-top: 0.3rem;
  }
  
  .inspector .text {
    font-size: 1.35rem;
    line-height: 1.55;
    color: #d4c8b0;
    margin: 1.2rem 0;
  }
  
  .inspector .note {
    background: #0a0805;
    border-left: 5px solid #ff00aa;
    padding: 1rem 1.3rem;
    margin: 1.5rem 0;
    font-size: 1.15rem;
    color: #b8a88a;
  }
  
  .inspector .cmd {
    font-family: 'Press Start 2P', monospace;
    background: #0a0805;
    padding: 0.8rem 1.2rem;
    border: 2px solid #00ffcc;
    color: #00ffcc;
    font-size: 1.05rem;
    letter-spacing: 1px;
    display: inline-block;
    margin-top: 0.5rem;
  }
  
  .process-constellation {
    display: flex;
    flex-wrap: wrap;
    gap: 1.2rem;
    justify-content: center;
    padding: 1rem 0;
  }
  
  .glyph-btn {
    background: #120f0a;
    border: 3px solid #3a2a1f;
    padding: 1rem 1.4rem;
    cursor: pointer;
    transition: all 0.2s cubic-bezier(0.23, 1, 0.32, 1);
    text-align: center;
    min-width: 110px;
    position: relative;
    overflow: hidden;
  }
  
  .glyph-btn:hover {
    transform: translateY(-6px) scale(1.03) rotate(1deg);
    border-color: #ff00aa;
    box-shadow: 0 0 35px rgba(255,0,170,0.4);
  }
  
  .glyph-btn.active {
    border-color: #ccff00;
    box-shadow: 0 0 40px #ccff00;
    background: #1a150f;
  }
  
  .glyph-btn .glyph {
    font-size: 2.8rem;
    line-height: 1;
    color: #ffeb68;
    text-shadow: 0 0 20px #ff2bd6;
  }
  
  .glyph-btn small {
    display: block;
    font-size: 0.95rem;
    color: #7dffcb;
    letter-spacing: 2px;
    margin-top: 0.4rem;
  }
  
  .glyph-btn .title {
    font-size: 1.15rem;
    color: #d4c8b0;
    margin-top: 0.3rem;
  }
  
  footer {
    text-align: center;
    padding: 3rem 1rem 2rem;
    font-size: 1.1rem;
    color: #665d4f;
  }
  
  footer a {
    color: #7dffcb;
    text-decoration: none;
  }
  
  @keyframes intense-glitch {
    0%, 92%, 100% { transform: none; }
    93% { transform: skew(1.5deg) translate(3px, -1px); }
    95% { transform: skew(-2deg) translate(-4px, 2px); }
  }
  
  @keyframes float-sigil {
    50% { transform: translateY(18px) rotate(1deg); }
  }
  
  .summon-flash {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at center, rgba(255,0,170,0.35) 0%, transparent 70%);
    pointer-events: none;
    z-index: 50;
    animation: summon-flash-anim 0.6s ease-out forwards;
  }
</style>
<link rel="stylesheet" href="/src/styles.css">
</head>
<body>
<div id="root"></div>
<script type="module" src="/src/main.js"></script>
</body>
</html>
